<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bram's World</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
  #canvas { display: block; width: 100vw; height: 100vh; }

  #overlay {
    position: fixed; inset: 0;
    background: #0a0a0a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    transition: opacity 0.8s ease;
  }
  #overlay h1 {
    font-size: clamp(3rem, 10vw, 8rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    color: #fff;
    line-height: 0.9;
  }
  #overlay h1 span { color: #FFD700; }
  #overlay p {
    margin-top: 2rem;
    color: #666;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  #enter-btn {
    margin-top: 3rem;
    padding: 1rem 3rem;
    border: 1px solid #333;
    background: transparent;
    color: #fff;
    font-family: inherit;
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
  }
  #enter-btn:hover { background: #FFD700; color: #000; border-color: #FFD700; }

  #crosshair {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
  }
  #crosshair::before, #crosshair::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.7);
  }
  #crosshair::before { width: 1px; height: 16px; top: -8px; left: 0; }
  #crosshair::after { width: 16px; height: 1px; left: -8px; top: 0; }

  #hud {
    position: fixed; bottom: 2rem; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.5s;
    pointer-events: none;
  }

  #interact-hint {
    position: fixed; top: 40%; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(255,215,0,0.5);
    color: #FFD700;
    padding: 0.5rem 1.5rem;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }

  #modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 50; opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  #modal.active { opacity: 1; pointer-events: all; }
  #modal-box {
    background: #111;
    border: 1px solid #333;
    padding: 3rem;
    max-width: 500px;
    width: 90%;
  }
  #modal-box h2 { color: #FFD700; font-size: 1.2rem; letter-spacing: 0.1em; margin-bottom: 1rem; }
  #modal-box p { color: #aaa; font-size: 0.9rem; line-height: 1.8; }
  #modal-close {
    margin-top: 2rem;
    display: block;
    background: transparent;
    border: 1px solid #333;
    color: #fff;
    font-family: inherit;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.75rem 2rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  #modal-close:hover { border-color: #FFD700; color: #FFD700; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="overlay">
  <h1>BRAM<br><span>SPIRA</span></h1>
  <p>Personal Universe</p>
  <button id="enter-btn">Enter →</button>
</div>

<div id="crosshair"></div>
<div id="hud">WASD · Move &nbsp;|&nbsp; Mouse · Look &nbsp;|&nbsp; E · Interact</div>
<div id="interact-hint">[ E ] Interact</div>

<div id="modal">
  <div id="modal-box">
    <h2 id="modal-title">Object</h2>
    <p id="modal-body">Content here.</p>
    <button id="modal-close">Close [ ESC ]</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const canvas = document.getElementById('canvas');
const overlay = document.getElementById('overlay');
const crosshair = document.getElementById('crosshair');
const hud = document.getElementById('hud');
const interactHint = document.getElementById('interact-hint');
const modal = document.getElementById('modal');
const modalTitle = document.getElementById('modal-title');
const modalBody = document.getElementById('modal-body');
const modalClose = document.getElementById('modal-close');

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1208);
scene.fog = new THREE.Fog(0x1a1208, 8, 25);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.7, 5);
camera.rotation.order = 'YXZ';

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

// Lighting
const ambient = new THREE.AmbientLight(0x1a1205, 0.4);
scene.add(ambient);

// Warm ceiling lights
function addLight(x, y, z, color, intensity, distance) {
  const light = new THREE.PointLight(color, intensity, distance);
  light.position.set(x, y, z);
  light.castShadow = true;
  scene.add(light);
  // Bulb geometry
  const bulb = new THREE.Mesh(
    new THREE.SphereGeometry(0.08, 8, 8),
    new THREE.MeshBasicMaterial({ color })
  );
  bulb.position.set(x, y + 0.1, z);
  scene.add(bulb);
  return light;
}

addLight(0, 2.8, 0, 0xffd580, 2.5, 12);
addLight(-5, 2.8, -5, 0xffd580, 1.5, 8);
addLight(5, 2.8, -5, 0xffd580, 1.5, 8);
addLight(-5, 2.8, 5, 0xffd580, 1.2, 8);

// Floor lamp glow
const lampGlow = new THREE.PointLight(0xff8833, 1.8, 5);
lampGlow.position.set(-6, 1.5, 2);
scene.add(lampGlow);

// Materials
const wallMat = new THREE.MeshLambertMaterial({ color: 0x2a2018 });
const floorMat = new THREE.MeshLambertMaterial({ color: 0x3d2b1a });
const ceilMat = new THREE.MeshLambertMaterial({ color: 0x1a1510 });
const woodMat = new THREE.MeshLambertMaterial({ color: 0x5c3a1e });
const darkWoodMat = new THREE.MeshLambertMaterial({ color: 0x3a2010 });
const cushionMat = new THREE.MeshLambertMaterial({ color: 0x4a3545 });
const metalMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
const whiteMat = new THREE.MeshLambertMaterial({ color: 0xe8e0d0 });
const yellowMat = new THREE.MeshLambertMaterial({ color: 0xFFD700 });
const greenPlantMat = new THREE.MeshLambertMaterial({ color: 0x2d5a1b });
const potMat = new THREE.MeshLambertMaterial({ color: 0x8b5e3c });

function box(w, h, d, mat, x, y, z, rx = 0, ry = 0) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z);
  m.rotation.x = rx;
  m.rotation.y = ry;
  m.castShadow = true;
  m.receiveShadow = true;
  scene.add(m);
  return m;
}

function cyl(rt, rb, h, seg, mat, x, y, z) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, seg), mat);
  m.position.set(x, y, z);
  m.castShadow = true;
  m.receiveShadow = true;
  scene.add(m);
  return m;
}

// Room: 16x6x16 (x: -8 to 8, z: -8 to 8)
const RW = 16, RH = 6, RD = 16;

// Floor, ceiling
box(RW, 0.1, RD, floorMat, 0, 0, 0);
box(RW, 0.1, RD, ceilMat, 0, RH, 0);

// Walls
box(RW, RH, 0.2, wallMat, 0, RH / 2, -RD / 2); // back
box(RW, RH, 0.2, wallMat, 0, RH / 2, RD / 2);  // front
box(0.2, RH, RD, wallMat, -RW / 2, RH / 2, 0); // left
box(0.2, RH, RD, wallMat, RW / 2, RH / 2, 0);  // right

// Baseboard trim
const trimMat = new THREE.MeshLambertMaterial({ color: 0x1a1208 });
box(RW, 0.15, 0.05, trimMat, 0, 0.075, -RD / 2 + 0.15);
box(RW, 0.15, 0.05, trimMat, 0, 0.075, RD / 2 - 0.15);
box(0.05, 0.15, RD, trimMat, -RW / 2 + 0.15, 0.075, 0);
box(0.05, 0.15, RD, trimMat, RW / 2 - 0.15, 0.075, 0);

// ── FURNITURE ──

// Desk (back-left area)
box(3, 0.08, 1.2, darkWoodMat, -4.5, 0.85, -5.5); // desktop
box(0.08, 0.85, 1.2, woodMat, -3.1, 0.42, -5.5); // leg R
box(0.08, 0.85, 1.2, woodMat, -5.9, 0.42, -5.5); // leg L
box(2.8, 0.08, 1, darkWoodMat, -4.5, 0.5, -5.5); // shelf

// Monitor
box(1.4, 0.9, 0.05, new THREE.MeshLambertMaterial({ color: 0x111111 }), -4.5, 1.5, -5.9);
box(0.2, 0.3, 0.1, metalMat, -4.5, 0.98, -5.9); // stand
// Screen glow
const screenGlow = new THREE.PointLight(0x4488ff, 0.8, 3);
screenGlow.position.set(-4.5, 1.5, -5.5);
scene.add(screenGlow);
// Screen surface (glowing blue)
const screenMat = new THREE.MeshBasicMaterial({ color: 0x223355 });
box(1.3, 0.8, 0.02, screenMat, -4.5, 1.5, -5.87);

// Keyboard & mouse
box(0.8, 0.02, 0.3, metalMat, -4.5, 0.9, -5.3);
box(0.12, 0.02, 0.2, metalMat, -3.8, 0.9, -5.2);

// Desk lamp
cyl(0.04, 0.04, 0.6, 8, metalMat, -3.3, 1.15, -5.5);
box(0.35, 0.04, 0.2, metalMat, -3.3, 1.48, -5.5);
const deskLamp = new THREE.PointLight(0xffee88, 1.2, 4);
deskLamp.position.set(-3.3, 1.4, -5.5);
scene.add(deskLamp);

// Bookshelf (right wall)
box(0.2, 4, 1.5, darkWoodMat, 7.6, 2, -5);
box(1.5, 0.08, 1.3, woodMat, 6.9, 1, -5);
box(1.5, 0.08, 1.3, woodMat, 6.9, 2, -5);
box(1.5, 0.08, 1.3, woodMat, 6.9, 3, -5);
box(1.5, 0.08, 1.3, woodMat, 6.9, 3.9, -5);
// Books
const bookColors = [0x8b2020, 0x205f8b, 0x208b40, 0x8b7020, 0x6b208b, 0x8b4020];
for (let shelf = 0; shelf < 3; shelf++) {
  let bx = 6.3;
  for (let i = 0; i < 5; i++) {
    const bw = 0.12 + Math.random() * 0.08;
    const bh = 0.6 + Math.random() * 0.25;
    box(bw, bh, 1.1, new THREE.MeshLambertMaterial({ color: bookColors[(shelf * 5 + i) % bookColors.length] }), bx, 1.05 + shelf, -5);
    bx += bw + 0.02;
  }
}

// Sofa (left-center)
box(3.5, 0.5, 1.2, cushionMat, -4.5, 0.35, 1); // base
box(3.5, 0.7, 0.25, cushionMat, -4.5, 0.75, 1.5); // back
box(0.25, 0.7, 1.2, cushionMat, -2.85, 0.75, 1); // arm R
box(0.25, 0.7, 1.2, cushionMat, -6.15, 0.75, 1); // arm L
// Cushions
const cushionColors = [0x5a3d55, 0x3d4555, 0x553d3d];
for (let i = 0; i < 3; i++) {
  box(1, 0.15, 1.0, new THREE.MeshLambertMaterial({ color: cushionColors[i] }), -3.3 - i * 1.1, 0.65, 1);
}
// Throw pillow
box(0.45, 0.35, 0.12, new THREE.MeshLambertMaterial({ color: 0xc4a882 }), -6, 0.9, 0.9);

// Coffee table
box(1.8, 0.06, 0.9, darkWoodMat, -4.5, 0.5, 2.8);
box(0.05, 0.5, 0.05, woodMat, -3.65, 0.25, 2.4);
box(0.05, 0.5, 0.05, woodMat, -5.35, 0.25, 2.4);
box(0.05, 0.5, 0.05, woodMat, -3.65, 0.25, 3.2);
box(0.05, 0.5, 0.05, woodMat, -5.35, 0.25, 3.2);
// Coffee cup on table
cyl(0.08, 0.06, 0.15, 12, whiteMat, -4.5, 0.58, 2.8);
cyl(0.05, 0.04, 0.02, 12, new THREE.MeshLambertMaterial({ color: 0x4a2800 }), -4.5, 0.66, 2.8);

// Floor lamp
cyl(0.04, 0.06, 0.05, 8, metalMat, -6.5, 0.025, 2.5);
cyl(0.025, 0.025, 1.8, 8, metalMat, -6.5, 0.95, 2.5);
cyl(0.35, 0.25, 0.45, 16, new THREE.MeshLambertMaterial({ color: 0xf5e6c8 }), -6.5, 2.1, 2.5);
cyl(0.05, 0.05, 0.05, 8, new THREE.MeshBasicMaterial({ color: 0xffee88 }), -6.5, 1.85, 2.5);

// Rug
box(5, 0.01, 3.5, new THREE.MeshLambertMaterial({ color: 0x4a3828 }), -4.5, 0.055, 1.8);
// Rug pattern border
box(4.6, 0.012, 3.1, new THREE.MeshLambertMaterial({ color: 0x6b5040 }), -4.5, 0.056, 1.8);

// Plant (corner)
cyl(0.2, 0.25, 0.4, 8, potMat, 6.5, 0.2, 6.5);
// Plant leaves (multiple spheres)
for (let i = 0; i < 6; i++) {
  const angle = (i / 6) * Math.PI * 2;
  const r = 0.3;
  const leafMesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.25 + Math.random() * 0.1, 8, 6),
    greenPlantMat
  );
  leafMesh.position.set(6.5 + Math.cos(angle) * r * 0.7, 0.7 + Math.random() * 0.4, 6.5 + Math.sin(angle) * r * 0.7);
  leafMesh.scale.y = 1.5;
  scene.add(leafMesh);
}
// Center stalk
cyl(0.03, 0.04, 0.6, 6, new THREE.MeshLambertMaterial({ color: 0x4a2800 }), 6.5, 0.5, 6.5);

// Small side table + plant (near sofa)
cyl(0.35, 0.35, 0.55, 12, woodMat, -7, 0.275, -0.5);
cyl(0.12, 0.15, 0.2, 8, potMat, -7, 0.58, -0.5);
const smallLeaf = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 6), greenPlantMat);
smallLeaf.position.set(-7, 0.85, -0.5);
smallLeaf.scale.set(1, 1.8, 1);
scene.add(smallLeaf);

// Wall art frame (back wall, center)
box(2.5, 1.8, 0.05, darkWoodMat, 2, 3.2, -7.85);
box(2.3, 1.6, 0.03, new THREE.MeshLambertMaterial({ color: 0xe8dcc8 }), 2, 3.2, -7.82);
// Abstract art inside frame — colored blocks
const artColors = [0x8b2020, 0x205f8b, 0xFFD700, 0x2d5a1b];
box(0.8, 0.8, 0.01, new THREE.MeshLambertMaterial({ color: artColors[0] }), 1.4, 3.4, -7.81);
box(0.7, 0.6, 0.01, new THREE.MeshLambertMaterial({ color: artColors[1] }), 2.4, 3.0, -7.81);
box(0.5, 1.2, 0.01, new THREE.MeshLambertMaterial({ color: artColors[2] }), 1.9, 3.3, -7.81);

// Window (right wall, back)
box(0.05, 2.5, 2.0, new THREE.MeshLambertMaterial({ color: 0x1a1510 }), 7.87, 3, -3); // frame
box(0.03, 2.3, 1.8, new THREE.MeshLambertMaterial({ color: 0x88ccff, transparent: true, opacity: 0.2 }), 7.86, 3, -3);
// Window light
const windowLight = new THREE.PointLight(0x88aaff, 0.6, 6);
windowLight.position.set(6.5, 3, -3);
scene.add(windowLight);
// Window cross bars
box(0.04, 2.3, 0.04, trimMat, 7.86, 3, -3);
box(0.04, 0.04, 1.8, trimMat, 7.86, 3, -3);

// Record player on desk-adjacent shelf
box(0.7, 0.08, 0.7, darkWoodMat, 3, 0.9, -7.5);
cyl(0.28, 0.28, 0.02, 24, new THREE.MeshLambertMaterial({ color: 0x111111 }), 3, 0.95, -7.5);
cyl(0.05, 0.05, 0.03, 12, new THREE.MeshLambertMaterial({ color: 0xcc2200 }), 3, 0.97, -7.5);
// Small shelf under it
box(1, 0.05, 0.8, darkWoodMat, 3, 0.6, -7.5);
box(1, 1.0, 0.05, darkWoodMat, 3, 0.5, -7.82);
box(1, 0.05, 0.8, darkWoodMat, 3, 0.05, -7.5);

// ── INTERACTIVE OBJECTS ──
const interactables = [];

function makeInteractable(mesh, title, body) {
  interactables.push({ mesh, title, body });
}

// Monitor is interactable
const monitorMesh = box(1.4, 0.9, 0.05, new THREE.MeshLambertMaterial({ color: 0x111111 }), -4.5, 1.5, -5.9);
makeInteractable(monitorMesh, 'PORTFOLIO', 'This is where my work lives. Projects, experiments, and things I built because I couldn\'t help myself. Gallery coming soon.');

// Bookshelf interactable proxy
const shelfProxy = box(1.8, 4, 1.5, new THREE.MeshLambertMaterial({ color: 0x000, transparent: true, opacity: 0 }), 6.9, 2, -5);
makeInteractable(shelfProxy, 'READING LIST', 'Books that changed how I think. Currently reading: everything at once, finishing nothing. Very on-brand.');

// Art frame
const artProxy = box(2.5, 1.8, 0.1, new THREE.MeshLambertMaterial({ transparent: true, opacity: 0 }), 2, 3.2, -7.85);
makeInteractable(artProxy, 'WALL ART', 'Original piece. Acquired under mysterious circumstances. The artist was unavailable for comment.');

// Record player
const recordProxy = box(0.7, 0.3, 0.7, new THREE.MeshLambertMaterial({ transparent: true, opacity: 0 }), 3, 0.95, -7.5);
makeInteractable(recordProxy, 'NOW PLAYING', 'Current rotation: something with too much reverb and not enough drums. Playlist link coming when I actually curate one properly.');

// Plant
const plantProxy = box(0.8, 1.2, 0.8, new THREE.MeshLambertMaterial({ transparent: true, opacity: 0 }), 6.5, 0.6, 6.5);
makeInteractable(plantProxy, 'MONSTERA', 'Her name is Greg. She\'s thriving, unlike my inbox. I water her on Sundays and apologize when I forget.');

// Sofa
const sofaProxy = box(3.5, 1, 1.5, new THREE.MeshLambertMaterial({ transparent: true, opacity: 0 }), -4.5, 0.5, 1);
makeInteractable(sofaProxy, 'THE SOFA', 'Where ideas go to either crystallize or die. Also where I do 70% of my thinking. The other 30% happens in the shower.');

// ── PLAYER CONTROLS ──
let yaw = Math.PI, pitch = 0;
const keys = {};
let isLocked = false;
let inModal = false;
let nearObject = null;

document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup', e => { keys[e.code] = false; });

canvas.addEventListener('click', () => {
  if (!isLocked && !inModal && overlay.style.display === 'none') canvas.requestPointerLock();
});

document.addEventListener('pointerlockchange', () => {
  isLocked = document.pointerLockElement === canvas;
  crosshair.style.opacity = isLocked ? '1' : '0';
  hud.style.opacity = isLocked ? '1' : '0';
});

document.addEventListener('mousemove', e => {
  if (!isLocked) return;
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, pitch));
});

document.addEventListener('keydown', e => {
  if (e.code === 'KeyE' && nearObject && isLocked) {
    openModal(nearObject.title, nearObject.body);
  }
  if (e.code === 'Escape' && inModal) {
    closeModal();
  }
});

modalClose.addEventListener('click', closeModal);

function openModal(title, body) {
  if (document.pointerLockElement) document.exitPointerLock();
  modalTitle.textContent = title;
  modalBody.textContent = body;
  modal.classList.add('active');
  inModal = true;
}

function closeModal() {
  modal.classList.remove('active');
  inModal = false;
  setTimeout(() => canvas.requestPointerLock(), 100);
}

// Enter button
document.getElementById('enter-btn').addEventListener('click', () => {
  overlay.style.opacity = '0';
  setTimeout(() => {
    overlay.style.display = 'none';
    canvas.requestPointerLock();
  }, 800);
});

// Raycaster for interaction
const raycaster = new THREE.Raycaster();

// Player collision
const PLAYER_SPEED = 0.065;
const ROOM_LIMIT = 7.5;

// Animation
let t = 0;

function animate() {
  requestAnimationFrame(animate);
  t += 0.01;

  // Camera rotation always applied
  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  if (isLocked && !inModal) {
    // Movement
    const dir = new THREE.Vector3();
    if (keys['KeyW']) dir.z -= 1;
    if (keys['KeyS']) dir.z += 1;
    if (keys['KeyA']) dir.x -= 1;
    if (keys['KeyD']) dir.x += 1;
    dir.normalize().multiplyScalar(PLAYER_SPEED);
    dir.applyEuler(new THREE.Euler(0, yaw, 0));

    const nx = camera.position.x + dir.x;
    const nz = camera.position.z + dir.z;

    if (Math.abs(nx) < ROOM_LIMIT) camera.position.x = nx;
    if (Math.abs(nz) < ROOM_LIMIT) camera.position.z = nz;
    camera.position.y = 1.7;

    // Interaction detection
    raycaster.setFromCamera({ x: 0, y: 0 }, camera);
    const hits = raycaster.intersectObjects(interactables.map(i => i.mesh));
    if (hits.length > 0 && hits[0].distance < 4) {
      const found = interactables.find(i => i.mesh === hits[0].object);
      nearObject = found || null;
    } else {
      nearObject = null;
    }
    interactHint.style.opacity = nearObject ? '1' : '0';
  }

  // Animate lamp glow
  lampGlow.intensity = 1.6 + Math.sin(t * 0.7) * 0.2;
  screenGlow.intensity = 0.6 + Math.sin(t * 2.1) * 0.1;
  deskLamp.intensity = 1.1 + Math.sin(t * 1.3) * 0.1;

  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
